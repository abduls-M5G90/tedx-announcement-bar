<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 0;
}

.announcement {
  background: #E62B1E;
  color: white;
  font-family: Arial, sans-serif;
  font-size: 16px;
  padding: 10px 0;
  white-space: nowrap;
  overflow: hidden;
}

.scroll-text {
  display: inline-block;
  padding-left: 100%;
  animation: scroll 15s linear infinite;
}

@keyframes scroll {
  from { transform: translateX(0); }
  to { transform: translateX(-100%); }
}
</style>
</head>

<body>
  <div class="announcement">
    <div class="scroll-text">
      🎤 TEDx IT 2026 | Theme Reveal Soon | Registrations Opening Shortly
    </div>
  </div>
</body>
</html>
