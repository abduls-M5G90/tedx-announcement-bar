<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: transparent;
}

/* 🔴 Banner */
.announcement {
  background: #E62B1E;
  color: white;
  font-family: Arial, sans-serif;
  height: 44px;
  width: 100%;
  overflow: hidden;
  white-space: nowrap;
}

/* ✅ Text styling */
.scroll-text {
  display: inline-block;
  line-height: 44px;
  padding-left: 100%;
  animation: scroll-left 15s linear infinite;
  font-size: 16px;
}

/* 🔁 Scroll animation */
@keyframes scroll-left {
  0% { transform: translateX(0); }
  100% { transform: translateX(-100%); }
}

/* 🔥 Flash effect */
.flash {
  animation: flashAnim 1s infinite;
}

@keyframes flashAnim {
  0%   { opacity: 1; }
  50%  { opacity: 0.2; }
  100% { opacity: 1; }
}

/* 📱 Mobile fix */
@media (max-width: 600px) {
  .announcement {
    height: 40px;
  }
  .scroll-text {
    line-height: 40px;
    font-size: 14px;
    animation-duration: 12s;
  }
}
</style>
</head>

<body>

<div class="announcement">
  <div class="scroll-text">
    🎤 <span id="title">TEDx Event Coming Soon</span> — March 28, 2026 |
    ⏳ <span id="countdown"></span>
  </div>
</div>

<script>
// 🎯 Event start (9 AM IST)
const eventStart = new Date("2026-03-28T09:00:00+05:30").getTime();

// 🎯 Event end (midnight IST)
const eventEnd = new Date("2026-03-29T00:00:00+05:30").getTime();

setInterval(() => {
  const now = new Date().getTime();

  const countdown = document.getElementById("countdown");
  const title = document.getElementById("title");

  // ⏳ BEFORE EVENT
  if (now < eventStart) {
    const gap = eventStart - now;

    const d = Math.floor(gap / (1000*60*60*24));
    const h = Math.floor((gap / (1000*60*60)) % 24);
    const m = Math.floor((gap / (1000*60)) % 60);

    countdown.innerHTML = d + "d " + h + "h " + m + "m left";
  }

  // 🔥 DURING EVENT (9 AM → 12 AM)
  else if (now >= eventStart && now < eventEnd) {
    countdown.innerHTML = "We’re LIVE 🎉";
    countdown.classList.add("flash");

    // 🌊 Title reveal
    title.innerHTML = "The Ripple Effects ";
  }

  // 🌙 AFTER EVENT
  else {
    countdown.innerHTML = "Event Ended";
    countdown.classList.remove("flash");
  }

}, 1000);
</script>

</body>
</html>
