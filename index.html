<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body {
  margin: 0;
  overflow: hidden;
}

/* 🔴 MAIN BANNER */
.announcement {
  background: #E62B1E;
  color: white;
  font-family: Arial, sans-serif;
  font-size: 16px;
  height: 40px;
  display: flex;
  align-items: center;   /* Vertical centering FIX */
  overflow: hidden;
  white-space: nowrap;
  width: 100%;
}

/* Scrolling text */
.scroll-text {
  display: inline-block;
  padding-left: 100%;
  animation: scroll-left 15s linear infinite;
}

@keyframes scroll-left {
  0% { transform: translateX(0%); }
  100% { transform: translateX(-100%); }
}

/* 📱 MOBILE OPTIMIZATION */
@media (max-width: 600px) {
  .announcement {
    font-size: 14px;
    height: 36px;
  }

  .scroll-text {
    animation-duration: 12s; /* Slightly faster on phone */
  }
}
</style>
</head>

<body>

<div class="announcement">
  <div class="scroll-text">
    🎤 TEDx Event Coming Soon — March 28, 2026 | 
    ⏳ <span id="countdown"></span>
  </div>
</div>

<script>
// Countdown Timer to March 28, 2026
const eventDate = new Date("March 28, 2026 00:00:00").getTime();

const timer = setInterval(() => {
  const now = new Date().getTime();
  const gap = eventDate - now;

  const days = Math.floor(gap / (1000 * 60 * 60 * 24));
  const hours = Math.floor((gap / (1000 * 60 * 60)) % 24);
  const minutes = Math.floor((gap / (1000 * 60)) % 60);

  document.getElementById("countdown").innerHTML =
    days + "d " + hours + "h " + minutes + "m left";

  if (gap < 0) {
    clearInterval(timer);
    document.getElementById("countdown").innerHTML = "We're LIVE 🎉";
  }
}, 1000);
</script>

</body>
</html>
